name: Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/loyyd/holy-songs

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,prefix=
            type=raw,value=main,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Capture build info
        id: build-info
        shell: bash
        run: |
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            VCS_REF=${{ github.sha }}
            IMAGE_REF=${{ env.IMAGE_NAME }}:${{ steps.build-info.outputs.short_sha }}
            BUILD_CREATED=${{ steps.build-info.outputs.created }}
            BUILD_SOURCE=${{ github.server_url }}/${{ github.repository }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-nomad:
    name: Deploy to Nomad
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      packages: read

    env:
      NOMAD_ADDR: https://nomad.bcgen.ie
      NOMAD_SKIP_VERIFY: "true"
      NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
      HOLY_SONGS_DOMAIN: holy-songs.bcgen.ie

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          for name in \
            NOMAD_TOKEN
          do
            if [[ -z "${!name:-}" ]]; then
              echo "::error title=Missing deployment secret::${name} is required"
              missing=1
            fi
          done

          exit "${missing}"

      - name: Resolve image digest
        id: image
        shell: bash
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::7}"
          image_tag="${IMAGE_NAME}:${short_sha}"

          for attempt in {1..30}; do
            digest="$(
              docker buildx imagetools inspect "${image_tag}" --format '{{json .Manifest}}' 2>/dev/null \
                | jq -r '.digest // empty'
            )"

            if [[ "${digest}" == sha256:* ]]; then
              echo "image=${image_tag}@${digest}" >> "${GITHUB_OUTPUT}"
              echo "Resolved ${image_tag}@${digest}"
              exit 0
            fi

            echo "Image ${image_tag} is not visible yet; retrying..."
            sleep 10
          done

          echo "Timed out waiting for ${image_tag}" >&2
          exit 1

      - name: Render current Nomad job with new image
        shell: bash
        env:
          DEPLOY_REF: ${{ steps.image.outputs.image }}
        run: |
          set -euo pipefail

          rendered_job="deploy/holy-songs.rendered.nomad.json"
          curl_args=(-fsS)
          if [[ "${NOMAD_SKIP_VERIFY}" == "true" ]]; then
            curl_args+=(-k)
          fi

          curl "${curl_args[@]}" \
            -H "X-Nomad-Token: ${NOMAD_TOKEN}" \
            "${NOMAD_ADDR}/v1/job/holy-songs" \
            | jq --arg image "${DEPLOY_REF}" \
              '(.TaskGroups[].Tasks[] | select(.Name == "holy-songs") | .Config.image) = $image | {Job: .}' \
              > "${rendered_job}"

      - name: Plan Nomad deployment
        shell: bash
        run: |
          set -euo pipefail

          curl_args=(-fsS)
          if [[ "${NOMAD_SKIP_VERIFY}" == "true" ]]; then
            curl_args+=(-k)
          fi

          curl "${curl_args[@]}" \
            -X POST \
            -H "X-Nomad-Token: ${NOMAD_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @deploy/holy-songs.rendered.nomad.json \
            "${NOMAD_ADDR}/v1/job/holy-songs/plan" \
            | jq .

      - name: Run Nomad deployment
        shell: bash
        run: |
          set -euo pipefail

          curl_args=(-fsS)
          if [[ "${NOMAD_SKIP_VERIFY}" == "true" ]]; then
            curl_args+=(-k)
          fi

          curl "${curl_args[@]}" \
            -X POST \
            -H "X-Nomad-Token: ${NOMAD_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @deploy/holy-songs.rendered.nomad.json \
            "${NOMAD_ADDR}/v1/jobs" \
            | jq .

      - name: Verify deployed revision
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..36}; do
            revision="$(curl -fsSL "https://${HOLY_SONGS_DOMAIN}/api/version" | jq -r '.git_sha // empty' || true)"

            if [[ "${revision}" == "${GITHUB_SHA}" ]]; then
              echo "Verified deployed revision ${revision}"
              exit 0
            fi

            echo "Production reports ${revision:-unknown}; waiting for ${GITHUB_SHA}..."
            sleep 5
          done

          echo "Could not verify deployed revision ${GITHUB_SHA}" >&2
          exit 1
