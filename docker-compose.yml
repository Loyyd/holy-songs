services:
  # The Backend API (Python/FastAPI)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["python3", "-m", "backend.main"]
    ports:
      - "8000:8000"
    volumes:
      - ../holy-songs-content:/app/content-repo
      - ./backend:/app/backend
      - song-data:/app/dist/data
    environment:
      - SONGS_DIR=/app/content-repo/songs
      - CONTENT_REPO_DIR=/app/content-repo
      - SONGS_OUTPUT_DIR=/app/dist/data
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - CONTENT_REPO_GIT_USER_NAME=${CONTENT_REPO_GIT_USER_NAME:-Holy Songs Bot}
      - CONTENT_REPO_GIT_USER_EMAIL=${CONTENT_REPO_GIT_USER_EMAIL:-holy-songs-bot@local}
    restart: unless-stopped

  # The Frontend (Nginx serving static files)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    volumes:
      - song-data:/usr/share/nginx/html/data:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  song-data:
