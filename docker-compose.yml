services:
  # The Backend API (Python/FastAPI)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - ../holy-songs-content/songs:/app/songs
      - ./backend:/app/backend
      - ./dist:/app/dist
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-truelove}
      - SONGS_DIR=/app/songs
      - SONGS_OUTPUT_DIR=/app/dist/data
    restart: unless-stopped

  # The Frontend (Nginx serving static files)
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
